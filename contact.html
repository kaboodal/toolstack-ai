
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact ToolStack AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="favicon.ico">
</head>
<body>
  <header class="header">
    <div class="container header-content">
      <h1 class="logo">🧰 ToolStack AI</h1>
      <nav>
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <h2>Contact Us</h2>
    <p>Have a question? Fill out the form below and we’ll get back to you soon.</p>
    <form action="https://formspree.io/f/yourFormID" method="POST" class="card">
      <label>Name:</label>
      <input type="text" name="name" required>
      <label>Email:</label>
      <input type="email" name="_replyto" required>
      <label>Message:</label>
      <textarea name="message" required></textarea>
      <button type="submit" class="btn">Send Message</button>
    </form>
  </main>

  <footer>
    <div class="container footer-links">
      <a href="index.html">Home</a>
      <a href="terms.html">Terms</a>
    </div>
    <p>© 2025 ToolStack AI</p>
  </footer>
</body>
</html>
